services:
  # Backend API
  - type: web
    name: catchweight-api
    runtime: python
    region: oregon
    repo: https://github.com/chadlmc1970/CatchWeight
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn catchweight.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_V2ALZjiI5qtr@ep-dark-hill-aiwdm4cf-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Frontend Dashboard
  - type: web
    name: catchweight-dashboard
    runtime: node
    region: oregon
    repo: https://github.com/chadlmc1970/CatchWeight
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://catchweight-api.onrender.com
