<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)"/>

  <!-- Scale Icon (Balance/Weight Symbol) -->
  <!-- Left Pan -->
  <ellipse cx="18" cy="28" rx="8" ry="3" fill="white" opacity="0.9"/>
  <line x1="18" y1="28" x2="18" y2="35" stroke="white" stroke-width="2" opacity="0.9"/>

  <!-- Right Pan -->
  <ellipse cx="46" cy="28" rx="8" ry="3" fill="white" opacity="0.9"/>
  <line x1="46" y1="28" x2="46" y2="35" stroke="white" stroke-width="2" opacity="0.9"/>

  <!-- Center Pole -->
  <line x1="32" y1="35" x2="32" y2="48" stroke="white" stroke-width="3" opacity="0.9"/>

  <!-- Balance Beam -->
  <line x1="18" y1="35" x2="46" y2="35" stroke="white" stroke-width="3" opacity="0.9"/>

  <!-- Base -->
  <rect x="26" y="48" width="12" height="4" rx="1" fill="white" opacity="0.9"/>

  <!-- AI Sparkle -->
  <circle cx="50" cy="16" r="5" fill="#fbbf24"/>
  <circle cx="50" cy="16" r="3" fill="white"/>
</svg>
